set-option -sa terminal-overrides ",xterm*:Tc"

bind -n M-H previous-window
bind -n M-L next-window

bind r source-file ~/.tmux.conf

# Unified session switcher: local tmux sessions + boxy dev boxes in one popup.
# Pick a local session -> switch to it; pick a boxy box -> ssh+attach to its
# shared tmux inside a thin local "boxy-<name>" wrapper session. (prefix + S)
# Reconcile a wrapper session per running boxy box, then open the *native*
# session switcher so boxes appear alongside local sessions. Selecting a box
# attaches to it (ssh) lazily. `s` stays the plain local-only choose-tree.
# -O time sorts by activity (most-recently-used first); add -r to invert.
bind S run-shell "~/.config/tmux/boxy-switcher.sh sync" \; choose-tree -Zs -O time
# Plain local-only switcher (tmux default), matched to the same last-used sort.
bind s choose-tree -Zs -O time

# Nested tmux pass-through (F12): flip whether keystrokes reach the INNER (boxy)
# tmux or stay on the OUTER laptop. The wrapper session's persistent status strip
# reads #{client_key_table} live, so it updates itself -- the binding only toggles
# prefix + key-table. (Outside a box this still toggles, harmlessly, with no strip.)
bind -T root F12 \
	set prefix None \;\
	set key-table passthrough \;\
	if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
	refresh-client -S
bind -T passthrough F12 \
	set -u prefix \;\
	set -u key-table \;\
	refresh-client -S

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# install tpm if not installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

# light mode
source-file ~/.config/tmux/dark.common
source-file ~/.config/tmux/light.common
